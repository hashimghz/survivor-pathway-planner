[theme]
base = "light"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F7F8"
textColor = "#1B1B1F"
primaryColor = "#5B2B5C"
font = "sans serif"

[server]
runOnSave = true
headless = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true

[ui]
hideTopBar = false
